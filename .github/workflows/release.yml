name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...
      - name: Build binaries
        run: bash scripts/build.sh "${GITHUB_REF_NAME}"
      - name: Checksums
        run: cd dist && sha256sum mc-tui-server_* > checksums.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/mc-tui-server_windows_amd64.exe
            dist/mc-tui-server_linux_amd64
            dist/mc-tui-server_linux_arm64
            dist/checksums.txt
